services:
  backend-app:
    build: ./backend
    container_name: backend_app
    restart: always
    volumes:
      - ./backend:/var/www/backend
    ports:
      - "8000:8000"
    depends_on:
      - db

  backend-queue:
    build: ./backend
    container_name: backend_queue
    restart: always
    command: ["php", "artisan", "queue:work", "--tries=3", "--timeout=600"]
    volumes:
      - ./backend:/var/www/backend
    depends_on:
      - db

  backend-socket:
    image: node:20
    container_name: backend_socket
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
    command: ["node", "scripts/socket-server.js"]
    ports:
      - "6001:6001"
    restart: always

  frontend-app:
    build: ./frontend
    container_name: frontend_app
    restart: always
    volumes:
      - ./frontend:/var/www/frontend
    ports:
      - "5173:5173"

  db:
    image: mysql:8.0
    container_name: yandex_reviews_db
    restart: always
    environment:
      MYSQL_DATABASE: yandex_reviews
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
